name: schueler_app
description: Schüler-App für das Gnadenthal-Gymnasium

publish_to: 'none'

version: 1.0.1+5

environment:
  sdk: ">=2.17.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  get: ^4.3.8
  shared_preferences: ^2.0.8
  flutter_spinkit: ^5.1.0
  intl: ^0.17.0
  smooth_page_indicator: ^1.0.0+2
  flutter_easyrefresh: ^2.2.1
  fluttericon: ^2.0.0
  url_launcher: ^6.0.15
  marquee_text: ^2.5.0+1
  firebase_core: ^1.10.2
  firebase_database: ^9.0.6
  cached_network_image: ^3.2.0
  firebase_auth: ^3.3.0
  firebase_messaging: ^11.2.7
  flutter_local_notifications: ^9.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^1.0.0

#   flutter_launcher_icons: "^0.9.2"

# flutter_icons:
#   android: "launcher_icon"
#   ios: false
#   image_path: "assets/icon/ios.png" # Provide icon for ios 
#   adaptive_icon_background: "assets/icon/background.png"
#   adaptive_icon_foreground: "assets/icon/foreground.png"

flutter:
  uses-material-design: true
  assets:
    - lang/
    - assets/images/
  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat/Montserrat-Regular.ttf
        - asset: assets/fonts/Montserrat/Montserrat-Black.ttf
          weight: 900
        - asset: assets/fonts/Montserrat/Montserrat-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Montserrat/Montserrat-Bold.ttf
          weight: 700
        - asset: assets/fonts/Montserrat/Montserrat-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Montserrat/Montserrat-Medium.ttf
          weight: 500
        - asset: assets/fonts/Montserrat/Montserrat-Light.ttf
          weight: 300
        - asset: assets/fonts/Montserrat/Montserrat-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Montserrat/Montserrat-Thin.ttf
          weight: 100
      
    - family: LobsterTwo
      fonts:
        - asset: assets/fonts/LobsterTwo/LobsterTwo-Regular.ttf